{% extends "base.html" %}

{% block titulo %}Editar Usuário - Registro de Usuários{% endblock %}

{% block conteudo %}
<div class="form-container">
    <h1>Editar Usuário</h1>
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" value="{{ usuario[0] }}" required>
        </div>

        <div class="form-group">
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" value="{{ usuario[1] }}" disabled>
        </div>

        <div class="form-group">
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" value="{{ usuario[2] }}" required min="0" max="150">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-large">Atualizar</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary btn-large">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
