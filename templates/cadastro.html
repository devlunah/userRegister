{% extends "base.html" %}

{% block titulo %}Cadastro - Registro de Usuários{% endblock %}

{% block conteudo %}
<div class="form-container">
    <h1>Cadastrar Novo Usuário</h1>
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required placeholder="Ex: João Silva">
        </div>

        <div class="form-group">
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" required placeholder="Ex: 123.456.789-00" maxlength="14">
        </div>

        <div class="form-group">
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" required placeholder="Ex: 25" min="0" max="150">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-large">Cadastrar</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary btn-large">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
